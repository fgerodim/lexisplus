<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LEXIS Plus AI Challenge</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <header class="main-header">
            <div class="brand-container">
                <img src="assets/logo.png" alt="LEXIS Plus" class="logo-main">
                <div class="sub-logos"></div>
            </div>
        </header>

        <section class="zone mission-zone">
            <div class="zone-tag">CORE MISSION</div>
            <div id="game-card">
                <div id="quiz-screen">
                    <div class="game-meta">
                        <span id="level-label">READY?</span>
                        <div class="xp-badge">XP: <span id="live-score">0000</span></div>
                    </div>
                    <div class="progress-container"><div id="progress-fill"></div></div>
                    <h2 id="question-text">Ξεκίνα την αποστολή για να δοκιμάσεις τις γνώσεις σου!</h2>
                    <div id="options-grid">
                        <button class="action-btn start-quiz" onclick="startGame()">START QUIZ</button>
                    </div>
                </div>
            </div>
        </section>

        <div class="neon-divider"></div>

        <section class="zone ai-lab-zone">
            <div class="zone-tag">AI LANGUAGE LAB</div>
            <div id="ai-card">
                <div class="mic-status">
                    <div class="pulse-ring"></div>
                    <span id="status-label">SENSOR OFF</span>
                </div>
                <div class="visualizer">
                    <div id="flag-display">🤖</div>
                </div>
                <div id="ai-controls">
                    <button id="activate-ai-btn" class="action-btn ai-btn" onclick="initAI()">ACTIVATE AI SENSOR</button>
                    <!-- Push-to-Talk button, hidden until model loads -->
                    <button id="record-btn" class="record-btn" style="display:none;">
                        <span class="record-icon">🎙️</span>
                        <span class="record-label">ΚΡΑΤΑ ΓΙΑ ΟΜΙΛΙΑ</span>
                    </button>
                </div>
                <p class="hint">Ενεργοποίησε το AI και πες "HELLO"</p>
            </div>
        </section>

        <footer>
            <p>© 2026 LEXIS Plus Coding & AI Academy</p>
        </footer>
    </div>

    <audio id="sfx-correct" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
    <audio id="sfx-wrong" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/speech-commands@0.4.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/audio@0.8/dist/teachablemachine-audio.min.js"></script>

    <script src="script.js"></script>
</body>
</html>
