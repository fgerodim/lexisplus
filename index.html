<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LEXIS Plus AI Challenge</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <header class="main-header">
            <div class="brand-container">
                <img src="assets/logo.png" alt="LEXIS Plus" class="logo-main">
                <div class="sub-logos">
                    <!--img src="assets/sub1.png" alt="Junior" class="logo-sub"-->
                    <!--img src="assets/sub2.png" alt="Advanced" class="logo-sub"-->
                </div>
            </div>
        </header>

        <main id="game-card">
            <div id="quiz-screen">
                <div class="game-meta">
                    <span id="level-label">LEVEL 1/5</span>
                    <div class="xp-badge">XP: <span id="live-score">0000</span></div>
                </div>
                <div class="progress-container"><div id="progress-fill"></div></div>
                <h2 id="question-text">System Initialization...</h2>
                <div id="options-grid">
                    <button class="start-btn" onclick="startGame()">MISSION START</button>
                </div>
            </div>
        </main>

        <section id="ai-module">
            <div class="mic-status">
                <div class="pulse-ring"></div>
                <span id="status-label">AI STANDBY</span>
            </div>
            <div class="visualizer"><div id="flag-display">🤖</div></div>
            <p class="hint">Πες "HELLO" για αναγνώριση φωνής</p>
        </section>

        <footer>
            <p>© 2026 LEXIS Plus Coding & AI Academy</p>
        </footer>
    </div>

    <audio id="sfx-correct" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
    <audio id="sfx-wrong" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/audio@0.8/dist/teachablemachine-audio.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
